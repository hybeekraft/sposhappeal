<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline | S'posh APPEAL</title>
  <link rel="icon" href="assets/sposh_logo.webp" type="image/webp" sizes="32x32">
  <link rel="apple-touch-icon" href="assets/sposh_logo.webp">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #06040a;
      --card-bg: #11091c;
      --accent: #e0447a;
      --accent-grad: linear-gradient(135deg, #e0447a, #ff8fab);
      --text-white: #faf0f5;
      --text-dim: #b090a8;
      --border-color: rgba(224, 68, 122, 0.2);
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      background-color: var(--bg-dark);
      color: var(--text-white);
      font-family: 'Outfit', sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
    }
    
    .offline-container {
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 48px 32px;
      max-width: 440px;
      width: 100%;
      text-align: center;
      box-shadow: 0 15px 50px rgba(0, 0, 0, 0.5), 0 0 30px rgba(224, 68, 122, 0.1);
      position: relative;
    }
    
    .offline-icon {
      font-size: 4rem;
      background: var(--accent-grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 24px;
      animation: pulse 2s infinite ease-in-out;
    }
    
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      margin-bottom: 12px;
      letter-spacing: 0.5px;
    }
    
    p {
      color: var(--text-dim);
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    
    .btn-retry {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: var(--accent-grad);
      border: none;
      color: #fff;
      padding: 14px 32px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      width: 100%;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 15px rgba(224, 68, 122, 0.3);
    }
    
    .btn-retry:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(224, 68, 122, 0.4);
    }
    
    .btn-retry:active {
      transform: translateY(0);
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(0.95); }
    }
  </style>
</head>
<body>

  <div class="offline-container">
    <div class="offline-icon">
      <i class="fa-solid fa-wifi-slash"></i>
    </div>
    <h1>Connection Lost</h1>
    <p>You are currently offline. Please check your internet connection and try reloading the page to access S'posh APPEAL.</p>
    <button class="btn-retry" onclick="window.location.reload()">
      <i class="fa-solid fa-arrow-rotate-right"></i> Check Connection
    </button>
  </div>

</body>
</html>
