<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | S'posh APPEAL</title>
  <link rel="icon" href="assets/sposh_logo.png" type="image/png">
  <meta name="theme-color" content="#1a1025">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:#0d0816;color:#e0d6f0;font-family:'Outfit',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 24px}
    .logo{display:flex;align-items:center;gap:10px;text-decoration:none;margin-bottom:40px}
    .logo img{width:40px;height:40px}
    .logo span{font-family:'Playfair Display',serif;font-size:1.1rem;color:#fff;font-weight:600}
    .code{font-family:'Playfair Display',serif;font-size:clamp(5rem,20vw,9rem);font-weight:800;background:linear-gradient(135deg,#e0447a,#ff8fab);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:16px}
    .icon{font-size:2.4rem;color:#e0447a;margin-bottom:20px;opacity:.7}
    h1{font-family:'Playfair Display',serif;font-size:clamp(1.5rem,5vw,2.2rem);color:#fff;margin-bottom:14px}
    p{font-size:1rem;color:#9080a8;max-width:420px;line-height:1.7;margin-bottom:40px}
    .actions{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
    .btn{display:inline-flex;align-items:center;gap:8px;padding:13px 26px;border-radius:4px;font-size:.95rem;font-weight:600;text-decoration:none;transition:all .2s;cursor:pointer;border:none;font-family:'Outfit',sans-serif}
    .btn-primary{background:#e0447a;color:#fff}
    .btn-primary:hover{background:#f0557e;transform:translateY(-2px)}
    .btn-ghost{background:transparent;border:1px solid rgba(224,68,122,0.4);color:#c0afd8}
    .btn-ghost:hover{border-color:#e0447a;color:#fff;transform:translateY(-2px)}
  </style>
</head>
<body>
  <a href="index.html" class="logo">
    <img src="assets/sposh_logo.png" alt="S'posh APPEAL Logo">
    <span>S'posh APPEAL</span>
  </a>
  <div class="code">404</div>
  <div class="icon"><i class="fa-solid fa-scissors"></i></div>
  <h1>Page Not Found</h1>
  <p>Looks like this page got a trim it didn't survive. The link may be broken or the page has been moved.</p>
  <div class="actions">
    <a href="index.html" class="btn btn-primary"><i class="fa-solid fa-house"></i> Back to Home</a>
    <a href="booking.html" class="btn btn-ghost"><i class="fa-regular fa-calendar-check"></i> Book Appointment</a>
  </div>
</body>
</html>
